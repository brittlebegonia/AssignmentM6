<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment 5</title>
    <script src="js/script.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous">
    <style>
        h1              {color: #ffffff; margin-bottom: 30px;}
        label           {font-weight: bold;}
        input, select   {margin-bottom: 10px;}
        form            {color: #024d50; width: 30%; padding: 20px;}
        body            {background-color: #8baaa1; font-family: monospace;}
        .form-box       {background-color: #ffffff; border: 2px solid #5e3902; border-radius: 10px; width: 450px;}
        .btn            {background-color: #9e6105; border-color: #5e3902;}
    </style>
</head>
<body class="m-4">
    <h1>Employee Management System</h1>
    <form id="empForm" class="form-box">

     <div class="container">

        <!-- Employee ID -->
        <div class="mb-3">
            <label class="form-label">8-Digit Employee ID</label>
            <input type="text" class="form-control" id="id" required>
        </div>

        <!-- Extension -->
        <div class="mb-3">
            <label class="form-label">4-Digit Extension</label>
            <input type="text" class="form-control" id="ext" required>
        </div>

        <!-- Full Name -->
        <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-control" id="name" required>
        </div>

        <!-- Email -->
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" id="email" required>
        </div>

        <!-- Department -->
        <div class="mb-3">
            <label class="form-label">Department</label>
            <select class="form-select" id="department">
                <option>Administrative</option>
                <option>Engineering</option>
                <option>Executive</option>
                <option>Marketing</option>
                <option>Quality Assurance</option>
                <option>Sales</option>
            </select>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="btn">Add Employee</button>
    </form>
</body>
</html>
